name: Deploy Scraper to Render

on:
  push:
    branches: [main]
    paths:
      - 'python-scraper/**'
      - '!python-scraper/venv/**'
      - '!python-scraper/__pycache__/**'
      - '.github/workflows/deploy-scraper.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python-scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Render CLI
        run: npm install -g render-cli

      - name: Deploy to Render
        run: render deploy --prod --token ${{ secrets.RENDER_API_TOKEN }}
        working-directory: .
